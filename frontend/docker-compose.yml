services:

  # REACT APP
  # Serve the React App.
  puregym-frontend:
    image: node:20-alpine
    container_name: puregym-frontend
    working_dir: /app
    env_file:
      - ../.env
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    restart: unless-stopped

volumes:
  node_modules:
